name: Apply Shopify variant URL wiring

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-shopify-variant-url-wiring.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Wire product variants to Shopify handles
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('assets/js/main.js')
          s = p.read_text(encoding='utf-8')
          old = 'const PRODUCT_VARIANT_URLS = {};'
          new = '''const PRODUCT_VARIANT_URLS = {};

const SHOPIFY_PRODUCT_BASE_URL = "https://micropatches.myshopify.com/products/";
const PRODUCT_VARIANT_HANDLE_SUFFIXES = Object.freeze({
  magnet: "micro-magnet",
  charm: "micro-charm",
  pin: "micro-pin"
});

function buildShopifyProductUrl(handle) {
  return handle ? `${SHOPIFY_PRODUCT_BASE_URL}${handle}` : "";
}

function buildDefaultVariantUrl(productId, type) {
  const suffix = PRODUCT_VARIANT_HANDLE_SUFFIXES[type];
  return suffix ? buildShopifyProductUrl(`${productId}-${suffix}`) : "";
}'''
          if new not in s:
              s = s.replace(old, new)
          s = s.replace('''    charm:    overrides.charm    || "",
    pin:      overrides.pin      || "",
    magnet:   overrides.magnet   || "",''', '''    charm:    overrides.charm    || buildDefaultVariantUrl(productId, "charm"),
    pin:      overrides.pin      || buildDefaultVariantUrl(productId, "pin"),
    magnet:   overrides.magnet   || buildDefaultVariantUrl(productId, "magnet"),''')
          p.write_text(s, encoding='utf-8')
          wf = Path('.github/workflows/apply-shopify-variant-url-wiring.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit applied wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/main.js .github/workflows/apply-shopify-variant-url-wiring.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Wire Shopify product variant URLs"
            git push
          fi

