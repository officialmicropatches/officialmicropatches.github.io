name: Apply product card lift

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-product-card-lift.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add product card lift interaction
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('assets/css/style.css')
          s = p.read_text(encoding='utf-8')
          s = s.replace('''  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: box-shadow var(--transition), transform var(--transition);
}
.product-card:hover {
  box-shadow: 0 0 24px rgba(201,151,42,0.18), 0 4px 16px rgba(0,0,0,0.4);
  transform: translateY(-2px);
}''', '''  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  transform: translateY(0) scale(1);
  will-change: transform, box-shadow, border-color;
  transition:
    transform 180ms ease,
    box-shadow 180ms ease,
    border-color 180ms ease;
}
.product-card:hover {
  border-color: rgba(201,151,42,0.42);
  box-shadow: 0 18px 34px rgba(0,0,0,0.46), 0 0 28px rgba(201,151,42,0.18);
  transform: translateY(-8px) scale(1.015);
}
.product-card:active {
  border-color: rgba(201,151,42,0.5);
  box-shadow: 0 12px 24px rgba(0,0,0,0.42), 0 0 18px rgba(201,151,42,0.16);
  transform: translateY(-4px) scale(1.008);
  transition-duration: 90ms;
}''')
          s = s.replace('''.product-card { cursor: pointer; }
.product-card:hover .product-card-img img,
.product-card:hover h3 { opacity: 0.85; transition: opacity 0.18s; }''', '''.product-card { cursor: pointer; -webkit-tap-highlight-color: transparent; }
.product-card:hover .product-card-img img,
.product-card:hover h3 { opacity: 0.92; transition: opacity 0.18s; }

@media (hover: none) and (pointer: coarse) {
  .product-card:hover {
    border-color: var(--border);
    box-shadow: none;
    transform: translateY(0) scale(1);
  }
  .product-card:active,
  .product-card.is-pressing {
    border-color: rgba(201,151,42,0.5);
    box-shadow: 0 14px 28px rgba(0,0,0,0.44), 0 0 20px rgba(201,151,42,0.16);
    transform: translateY(-6px) scale(1.012);
  }
}

@media (prefers-reduced-motion: reduce) {
  .product-card {
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .product-card:hover,
  .product-card:active,
  .product-card.is-pressing {
    transform: none;
  }
}''')
          p.write_text(s, encoding='utf-8')
          wf = Path('.github/workflows/apply-product-card-lift.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit applied lift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/css/style.css .github/workflows/apply-product-card-lift.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add product card lift interaction"
            git push
          fi
