name: Apply site text fixes

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-site-text-fixes.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply copy and card cleanup
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          donation_sentence = "Every purchase brings us closer to our long term goal: a portion of every sale goes toward donations to families of fallen officers, veterans, and first responders. No minimum orders — every department, every unit included."
          donation_sentence_html = "Every purchase brings us closer to our long term goal: <strong>a portion of every sale goes toward donations to families of fallen officers, veterans, and first responders.</strong> No minimum orders — every department, every unit included."

          index = Path("index.html")
          html = index.read_text(encoding="utf-8")
          html = html.replace(
              '<p class="hero-mission">Our goal is to donate a portion of every sale to the families of those who made the <strong>ULTIMATE SACRIFICE</strong>.</p>',
              f'<p class="hero-mission">{donation_sentence_html}</p>'
          )
          html = html.replace(
              'MicroPatches was founded by an active duty law enforcement officer and United States Army National Guard veteran based in Phoenix, Arizona. We specialize in UV-printed 3D scaled-down patch keychains for law enforcement, military, fire, EMS, and custom designs. Everything we make is USA made with no minimum orders so no agency or unit gets left out. Our long term mission is to donate a portion of all proceeds to the families of fallen officers, veterans, and first responders.',
              f'MicroPatches was founded by an active duty law enforcement officer and United States Army National Guard veteran based in Phoenix, Arizona. We specialize in UV-printed 3D scaled-down patch keychains for law enforcement, military, fire, EMS, and custom designs. {donation_sentence}'
          )
          html = re.sub(
              r'(<div class="product-card-body">\s*(?:<span class="best-seller-badge">Best Seller</span>\s*)?<h3>[^<]+</h3>)\s*<p>.*?</p>',
              r'\1',
              html,
              flags=re.S
          )
          index.write_text(html, encoding="utf-8")

          custom = Path("custom.html")
          html = custom.read_text(encoding="utf-8")
          html = html.replace(
              "Our goal isn't profit on design fees. It's to donate a portion of every order back to the families of fallen officers, veterans, and first responders — and to make sure no law enforcement agency, fire department, military unit, or EMS organization gets left out, no matter how big or small.",
              f"Our goal isn't profit on design fees. {donation_sentence}"
          )
          custom.write_text(html, encoding="utf-8")

          product = Path("product.html")
          html = product.read_text(encoding="utf-8")
          html = html.replace(
              "A portion of every sale goes toward donations to families of fallen officers, veterans, and first responders. No minimum orders — every department, every unit included.",
              donation_sentence
          )
          product.write_text(html, encoding="utf-8")

          css_path = Path("assets/css/style.css")
          css = css_path.read_text(encoding="utf-8")
          css = re.sub(
              r'(\.product-card-body p \{\n)(?!\s*display: none;)',
              r'\1  display: none;\n',
              css,
              count=1
          )
          css_path.write_text(css, encoding="utf-8")

          workflow = Path(".github/workflows/apply-site-text-fixes.yml")
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit applied fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html custom.html product.html assets/css/style.css .github/workflows/apply-site-text-fixes.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update product copy and remove card descriptions"
            git push
          fi
