name: Inventory snapshot

# Builds a static inventory.json (handle -> { q: qty|null, a: available })
# from Shopify's PUBLIC per-product feed (/products/<handle>.js). No token
# or secret required — these endpoints are public.
#
# Manual-only by design. The committed seed inventory.json already powers
# the "Only N left" scarcity badges; rerun this on-demand whenever stock
# shifts meaningfully. The hourly cron was removed because GitHub kept
# emailing failures whenever git push was blocked (branch protection /
# default workflow permissions) — the seed alone is good enough.

on:
  workflow_dispatch: {}

concurrency:
  group: inventory-snapshot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # Never fail the job — this is a best-effort refresh, not critical infra.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build inventory.json (best effort)
        shell: bash
        continue-on-error: true
        run: |
          set +e
          set -uo pipefail
          STORE="https://micropatches.myshopify.com"
          UA="Mozilla/5.0 (compatible; MicroPatchesInventoryBot/1.0)"

          handles=""
          page=1
          while :; do
            body=$(curl -s -m 30 -A "$UA" "$STORE/products.json?limit=250&page=$page" || echo '{"products":[]}')
            n=$(echo "$body" | jq '.products | length' 2>/dev/null || echo 0)
            if [ -z "$n" ] || [ "$n" = "0" ]; then break; fi
            handles="$handles"$'\n'$(echo "$body" | jq -r '.products[].handle' 2>/dev/null || true)
            if [ "$n" -lt 250 ]; then break; fi
            page=$((page+1))
            if [ "$page" -gt 10 ]; then break; fi
          done
          handles=$(echo "$handles" | sed '/^$/d' | sort -u)
          count=$(echo "$handles" | grep -c . || true)
          echo "Found $count product handles"
          if [ "$count" -eq 0 ]; then echo "No products; nothing to do."; exit 0; fi

          tmp=$(mktemp)
          echo "{" > "$tmp"
          first=1
          while IFS= read -r h; do
            if [ -z "$h" ]; then continue; fi
            pj=$(curl -s -m 20 -A "$UA" "$STORE/products/$h.js" || true)
            row=$(echo "$pj" | jq -c '
              (.variants[0] // {}) as $v
              | { a: ($v.available == true),
                  q: ( if ($v.inventory_management != null) and ($v.inventory_quantity | type == "number")
                       then ( if $v.inventory_quantity < 0 then 0 else $v.inventory_quantity end)
                       else null end ) }' 2>/dev/null || echo '')
            if [ -z "$row" ]; then continue; fi
            if [ "$first" -eq 0 ]; then echo "," >> "$tmp"; fi
            first=0
            printf '%s: %s' "$(echo "$h" | jq -R .)" "$row" >> "$tmp"
          done <<< "$handles"
          if [ "$first" -eq 0 ]; then echo "," >> "$tmp"; fi
          printf '%s: %s\n}\n' '"_updatedAt"' "$(date -u +%Y-%m-%dT%H:%M:%SZ | jq -R .)" >> "$tmp"

          if ! jq . "$tmp" > inventory.json 2>/dev/null; then
            echo "Assembled JSON invalid; leaving committed inventory.json untouched."
            rm -f "$tmp"
            exit 0
          fi
          rm -f "$tmp"
          echo "Wrote inventory.json ($(jq 'keys|length' inventory.json) keys)"

          if git diff --quiet -- inventory.json; then
            echo "No inventory change."
            exit 0
          fi

          git config user.name  "inventory-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inventory.json
          git commit -m "[skip ci] inventory snapshot" || true
          if git push 2>err.log; then
            echo "Committed updated inventory.json"
          else
            echo "Push blocked (likely repo workflow-permissions or branch protection):"
            cat err.log || true
            echo "Snapshot generated locally; not published."
          fi
          # Always succeed.
          exit 0
