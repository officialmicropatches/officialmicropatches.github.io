function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gradeC(g){return{A:{bg:'#DCFCE7',c:'#16A34A'},B:{bg:'#ECFCCB',c:'#65A30D'},C:{bg:'#FEF9C3',c:'#CA8A04'},D:{bg:'#FFEDD5',c:'#EA580C'},F:{bg:'#FEE2E2',c:'#DC2626'}}[g]||{bg:'#F3F4F6',c:'#6B7280'};}
function badge(g,sz){
  if(!g)return'';
  const{bg,c}=gradeC(g);
  const d=sz==='xl'?'4rem':sz==='lg'?'3rem':sz==='sm'?'1.625rem':'2.25rem';
  const fs=sz==='xl'?'1.375rem':sz==='lg'?'1.125rem':sz==='sm'?'0.7rem':'0.8rem';
  const fw=sz==='xl'||sz==='lg'?'900':'700';
  return`<div style="width:${d};height:${d};border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:${bg};color:${c};font-size:${fs};font-weight:${fw};">${g}</div>`;
}
function ago(ds){const d=Math.floor((Date.now()-new Date(ds))/864e5);return d<1?'today':d<7?d+'d ago':d<30?Math.floor(d/7)+'w ago':d<365?Math.floor(d/30)+'mo ago':Math.floor(d/365)+'y ago';}
function avgGrade(reviews,cats){
  if(!reviews||!reviews.length)return{};
  const t={},c={},m={A:4,B:3,C:2,D:1,F:0};
  for(const r of reviews)for(const{k}of cats){if(r[k]){t[k]=(t[k]||0)+m[r[k]];c[k]=(c[k]||0)+1;}}
  const o={};
  for(const{k}of cats)if(c[k]){const a=t[k]/c[k];o[k]=a>=3.5?'A':a>=2.5?'B':a>=1.5?'C':a>=0.5?'D':'F';}
  return o;
}
const ACATS=[{k:'grade_communication',l:'Communication'},{k:'grade_fairness',l:'Fairness'},{k:'grade_accountability',l:'Accountability'},{k:'grade_backing_officers',l:'Backs Officers'},{k:'grade_morale',l:'Morale'},{k:'grade_promotion_fairness',l:'Promotions'},{k:'grade_work_life_balance',l:'Work/Life'},{k:'grade_toxic_leadership',l:'No Toxic Leadership'}];
const SCATS=[{k:'grade_communication',l:'Communication'},{k:'grade_fairness',l:'Fairness'},{k:'grade_accountability',l:'Accountability'},{k:'grade_professionalism',l:'Professionalism'},{k:'grade_retaliation',l:'No Retaliation'},{k:'grade_morale_impact',l:'Morale Impact'},{k:'grade_backing_officers',l:'Backs Officers'},{k:'grade_promotion_fairness',l:'Promotions'},{k:'grade_assignment_fairness',l:'Assignments'}];
const RANK_ORDER={'Chief of Police / Sheriff':1,'Assistant Chief / Undersheriff':2,'Deputy Chief':3,'Commander':4,'Captain':5,'Lieutenant':6,'Sergeant':7,'Corporal':8};
const RANK_STYLE={'Chief of Police / Sheriff':{bg:'#EFF6FF',c:'#1B2E4B'},'Assistant Chief / Undersheriff':{bg:'#EFF6FF',c:'#3A5A8C'},'Deputy Chief':{bg:'#F0F9FF',c:'#0369A1'},'Commander':{bg:'#F0F9FF',c:'#0284C7'},'Captain':{bg:'#F0FEFF',c:'#0891B2'},'Lieutenant':{bg:'#F0FDF4',c:'#15803D'},'Sergeant':{bg:'#F9FAFB',c:'#6B7280'},'Corporal':{bg:'#F9FAFB',c:'#9CA3AF'}};

function route(){
  const h=window.location.hash.replace(/^#\/?/,'')||'';
  const p=h.split('/').filter(Boolean);
  if(!p.length)return{pg:'landing'};
  if(p[0]==='agency'&&p[1])return{pg:'agency',slug:p[1]};
  if(p[0]==='supervisor'&&p[1])return{pg:'supervisor',slug:p[1]};
  if(p[0]==='login')return{pg:'login'};
  if(p[0]==='signup')return{pg:'signup'};
  return{pg:'landing'};
}

// ─── Q&A ──────────────────────────────────────────────────────────────────────
function qaPanel(slug,agencyId){
  const questions=[...(QUESTIONS_DATA[slug]||[]),...(S.localQuestions[slug]||[])];
  return`<div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
    <h3 style="font-size:1rem;font-weight:600;color:#1A1A1A;margin:0;">Community Q&amp;A</h3>
    ${questions.length>0?`<span style="font-size:.75rem;color:#6B7280;">${questions.length} question${questions.length!==1?'s':''}</span>`:''}
  </div>
  ${S.user
    ?`<div style="margin-bottom:1.5rem;">
        <textarea id="qa-input" placeholder="Ask anonymously about this agency — morale, specialties, lateral culture, schedules..." rows="3" style="width:100%;padding:.75rem 1rem;font-size:.875rem;border:1px solid #E5E7EB;border-radius:1rem;resize:none;font-family:inherit;outline:none;background:#fff;" onfocus="this.style.borderColor='#1B2E4B'" onblur="this.style.borderColor='#E5E7EB'"></textarea>
        <button onclick="submitQuestion('${x(slug)}',${agencyId})" style="margin-top:.625rem;background:#1B2E4B;color:#fff;font-size:.875rem;font-weight:500;padding:.625rem 1.25rem;border:none;border-radius:100px;cursor:pointer;">Post Question</button>
      </div>`
    :`<div style="margin-bottom:1.5rem;padding:1rem;background:#F9F9F7;border:1px solid #E5E7EB;border-radius:1rem;font-size:.875rem;color:#6B7280;">
        <a href="#/login" style="color:#1B2E4B;font-weight:600;">Log in</a> or <a href="#/signup" style="color:#1B2E4B;font-weight:600;">sign up</a> to ask a question anonymously.
      </div>`
  }
  ${questions.length===0
    ?`<p style="text-align:center;color:#6B7280;font-size:.875rem;padding:2.5rem 0;">No questions yet. Be the first to ask one.</p>`
    :`<div style="display:flex;flex-direction:column;gap:1rem;">${questions.map(q=>questionThread(q,slug)).join('')}</div>`
  }
</div>`;
}

function questionThread(q,slug){
  const replies=[...(q.replies||[]),...(S.localReplies[q.id]||[])];
  const shown=S.expandedReplies[q.id];
  return`<div style="background:#fff;border:1px solid #E5E7EB;border-radius:1rem;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05);">
  <p style="font-size:.875rem;color:#1A1A1A;margin:0 0 .25rem;font-weight:500;">${x(q.body)}</p>
  <p style="font-size:.7rem;color:#9CA3AF;margin:0 0 .75rem;">${ago(q.created_at)}</p>
  ${replies.length>0?`
    <button onclick="toggleReplies(${q.id},'${x(slug)}')" style="font-size:.75rem;color:#1B2E4B;background:none;border:none;cursor:pointer;font-weight:500;padding:0;margin-bottom:.5rem;">
      ${shown?'Hide':'Show'} ${replies.length} repl${replies.length!==1?'ies':'y'}
    </button>
    ${shown?`<div style="border-left:2px solid #E5E7EB;padding-left:.875rem;margin-bottom:.75rem;display:flex;flex-direction:column;gap:.625rem;">
      ${replies.map(r=>`<div><p style="font-size:.8rem;color:#374151;margin:0 0 .2rem;line-height:1.55;">${x(r.body)}</p><p style="font-size:.65rem;color:#9CA3AF;margin:0;">${ago(r.created_at)}</p></div>`).join('')}
    </div>`:''}`:''
  }
  ${S.user?`<div style="display:flex;gap:.5rem;align-items:center;margin-top:.25rem;">
    <input id="reply-${q.id}" placeholder="Reply anonymously..." style="flex:1;padding:.5rem .75rem;font-size:.8rem;border:1px solid #E5E7EB;border-radius:100px;outline:none;font-family:inherit;background:#F9F9F7;">
    <button onclick="submitReply(${q.id},'${x(slug)}')" style="background:#1B2E4B;color:#fff;font-size:.75rem;padding:.5rem .875rem;border:none;border-radius:100px;cursor:pointer;white-space:nowrap;">Reply</button>
  </div>`:''}
</div>`;
}

function toggleReplies(qid,slug){S.expandedReplies[qid]=!S.expandedReplies[qid];document.getElementById('app').innerHTML=renderAgency(slug);}

function submitQuestion(slug,agencyId){
  const el=document.getElementById('qa-input');
  if(!el||!el.value.trim())return;
  const q={id:Date.now(),created_at:new Date().toISOString(),body:el.value.trim(),replies:[]};
  if(!S.localQuestions[slug])S.localQuestions[slug]=[];
  S.localQuestions[slug].unshift(q);
  document.getElementById('app').innerHTML=renderAgency(slug);
}

function submitReply(qid,slug){
  const el=document.getElementById('reply-'+qid);
  if(!el||!el.value.trim())return;
  const r={id:Date.now(),created_at:new Date().toISOString(),body:el.value.trim()};
  if(!S.localReplies[qid])S.localReplies[qid]=[];
  S.localReplies[qid].push(r);
  S.expandedReplies[qid]=true;
  document.getElementById('app').innerHTML=renderAgency(slug);
}

function doSignup(e){
  e.preventDefault();
  const u=document.getElementById('su-user').value.trim();
  const p=document.getElementById('su-pass').value;
  const err=document.getElementById('su-err');
  if(!u||u.length<3){err.textContent='Username must be at least 3 characters.';err.style.display='block';return;}
  if(!/^[a-zA-Z0-9_]+$/.test(u)){err.textContent='Username may only contain letters, numbers, and underscores.';err.style.display='block';return;}
  if(!p||p.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}
  setUser({username:u,id:'mock-'+Date.now()});
  go('/');
}

function openRateAgency(agencyId,agencyName){
  if(!S.user){go('/login');return;}
  S.modal={type:'agency',step:0,agencyId,agencyName,grades:{},text:''};
  renderModal();
}

function renderAgencyModal(){
  const m=S.modal;
  if(m.step===0)return`
    <div style="padding:1.5rem 1.5rem 0;">
      <p style="font-size:.7rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em;margin:0 0 .5rem;">Step 1 of 2</p>
      <h2 style="font-size:1.125rem;font-weight:800;color:#1B2E4B;margin:0 0 .25rem;">Rate ${x(m.agencyName)}</h2>
      <p style="font-size:.8rem;color:#6B7280;margin:0 0 1.25rem;">Your review is anonymous. No identifying information is collected.</p>
    </div>
    <div style="padding:.75rem 1.5rem;background:#FFFBEB;border-top:1px solid #FDE68A;border-bottom:1px solid #FDE68A;font-size:.8rem;color:#92400E;line-height:1.5;">
      <strong>Before you rate:</strong> Only rate agencies where you have direct personal experience as an employee, recruit, or lateral. Do not rate based on secondhand information.
    </div>
    <div style="padding:1.5rem;display:flex;flex-direction:column;gap:1rem;">
      <button onclick="advanceAgencyModal()" style="background:#1B2E4B;color:#fff;font-size:.875rem;font-weight:500;padding:.875rem;border:none;border-radius:100px;cursor:pointer;">I understand — Rate this agency</button>
    </div>`;

  if(m.step===1){
    const filled=Object.keys(m.grades).length;
    const pct=Math.round((filled/ACATS.length)*100);
    return`
    <div style="padding:1.5rem 1.5rem .75rem;">
      <p style="font-size:.7rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em;margin:0 0 .5rem;">Step 2 of 2 · ${filled}/${ACATS.length} rated</p>
      <div style="height:4px;background:#F3F4F6;border-radius:2px;overflow:hidden;margin-bottom:1.25rem;">
        <div style="height:100%;background:#1B2E4B;border-radius:2px;width:${pct}%;transition:width .2s;"></div>
      </div>
      <h2 style="font-size:1.125rem;font-weight:800;color:#1B2E4B;margin:0 0 .25rem;">Grade each category</h2>
      <p style="font-size:.8rem;color:#6B7280;margin:0;">Select a letter grade for each area. A = Excellent, F = Failing.</p>
    </div>
    <div style="padding:0 1.5rem;display:flex;flex-direction:column;gap:1.25rem;max-height:55vh;overflow-y:auto;">
      ${ACATS.map(({k,l})=>gradeRow(k,l,m.grades[k],'agency')).join('')}
    </div>
    <div style="padding:1.5rem;display:flex;flex-direction:column;gap:.75rem;">
      <textarea id="modal-text" placeholder="Add context (optional) — culture, leadership style, what improved or declined…" rows="3" style="width:100%;padding:.75rem 1rem;font-size:.875rem;border:1px solid #E5E7EB;border-radius:.875rem;resize:none;font-family:inherit;outline:none;" onfocus="this.style.borderColor='#1B2E4B'" onblur="this.style.borderColor='#E5E7EB'">${x(m.text||'')}</textarea>
      <button onclick="submitAgencyReview()" ${filled===0?'disabled':''} style="background:#1B2E4B;color:#fff;font-size:.875rem;font-weight:500;padding:.875rem;border:none;border-radius:100px;cursor:pointer;opacity:${filled===0?.5:1};">Submit Review</button>
    </div>`;
  }

  return`<div style="padding:2rem 1.5rem;text-align:center;">
    <div style="width:3rem;height:3rem;background:#DCFCE7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
      <svg width="20" height="20" fill="none" stroke="#16A34A" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2 style="font-size:1.125rem;font-weight:800;color:#1B2E4B;margin:0 0 .5rem;">Review submitted</h2>
    <p style="font-size:.875rem;color:#6B7280;margin:0 0 1.5rem;">Thank you for keeping law enforcement accountable.</p>
    <button onclick="closeModal()" style="background:#1B2E4B;color:#fff;font-size:.875rem;font-weight:500;padding:.75rem 2rem;border:none;border-radius:100px;cursor:pointer;">Done</button>
  </div>`;
}

function advanceAgencyModal(){S.modal.step=1;renderModal();}

function submitAgencyReview(){
  const ta=document.getElementById('modal-text');
  const text=ta?ta.value.trim():'';
  const m=S.modal;
  const review={id:Date.now(),created_at:new Date().toISOString(),...m.grades,body:text||null};
  const slug=AGENCIES.find(a=>a.id===m.agencyId)?.slug;
  if(slug){if(!S.localReviews[slug])S.localReviews[slug]=[];S.localReviews[slug].unshift(review);}
  m.step=2;renderModal();
}

          </button>`;
        }).join('')}
      <button style="background:none;border:2px dashed #E5E7EB;border-radius:.875rem;padding:.875rem;cursor:pointer;color:#6B7280;font-size:.875rem;">+ Suggest a supervisor not listed</button>
    </div>`;
  }

  if(m.step===1){
    const sup=SUPERVISORS.find(s=>s.id===m.supervisorId);
    const filled=Object.keys(m.grades).length;
    const pct=Math.round((filled/SCATS.length)*100);
    return`
    <div style="padding:1.5rem 1.5rem .75rem;">
      <p style="font-size:.7rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em;margin:0 0 .5rem;">${filled}/${SCATS.length} categories rated</p>
      <div style="height:4px;background:#F3F4F6;border-radius:2px;overflow:hidden;margin-bottom:1rem;">
        <div style="height:100%;background:#1B2E4B;border-radius:2px;width:${pct}%;transition:width .2s;"></div>
      </div>
      <h2 style="font-size:1.125rem;font-weight:800;color:#1B2E4B;margin:0 0 .125rem;">${sup?x(sup.display_name):'Supervisor'}</h2>
      <p style="font-size:.8rem;color:#6B7280;margin:0;">Select a letter grade for each area. A = Excellent, F = Failing.</p>
    </div>
    <div style="padding:0 1.5rem;display:flex;flex-direction:column;gap:1.25rem;max-height:50vh;overflow-y:auto;">
      ${SCATS.map(({k,l})=>gradeRow(k,l,m.grades[k],'supervisor')).join('')}
    </div>
    <div style="padding:1.5rem;display:flex;flex-direction:column;gap:.75rem;">
      <textarea id="modal-text" placeholder="Add context (optional) — specific examples, patterns, incidents…" rows="3" style="width:100%;padding:.75rem 1rem;font-size:.875rem;border:1px solid #E5E7EB;border-radius:.875rem;resize:none;font-family:inherit;outline:none;" onfocus="this.style.borderColor='#1B2E4B'" onblur="this.style.borderColor='#E5E7EB'">${x(m.text||'')}</textarea>
      <button onclick="submitSupervisorReview()" ${filled===0?'disabled':''} style="background:#1B2E4B;color:#fff;font-size:.875rem;font-weight:500;padding:.875rem;border:none;border-radius:100px;cursor:pointer;opacity:${filled===0?.5:1};">Submit Review</button>
    </div>`;
  }

  return`<div style="padding:2rem 1.5rem;text-align:center;">
    <div style="width:3rem;height:3rem;background:#DCFCE7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
      <svg width="20" height="20" fill="none" stroke="#16A34A" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2 style="font-size:1.125rem;font-weight:800;color:#1B2E4B;margin:0 0 .5rem;">Review submitted</h2>
    <p style="font-size:.875rem;color:#6B7280;margin:0 0 1.5rem;">Thank you for keeping law enforcement accountable.</p>
    <button onclick="closeModal()" style="background:#1B2E4B;color:#fff;font-size:.875rem;font-weight:500;padding:.75rem 2rem;border:none;border-radius:100px;cursor:pointer;">Done</button>
  </div>`;
}

function selectSupervisorForRating(supId,supSlug){S.modal.supervisorId=supId;S.modal.supervisorSlug=supSlug;S.modal.step=1;renderModal();}

function submitSupervisorReview(){
  const ta=document.getElementById('modal-text');
  const text=ta?ta.value.trim():'';
  const m=S.modal;
  const review={id:Date.now(),created_at:new Date().toISOString(),...m.grades,body:text||null};
  const sl=m.supervisorSlug;
  if(sl){if(!S.localSupReviews[sl])S.localSupReviews[sl]=[];S.localSupReviews[sl].unshift(review);}
  m.step=2;renderModal();
}

// ─── GRADE ROW (shared) ───────────────────────────────────────────────────────
function gradeRow(k,label,selected,ctx){
  return`<div>
  <p style="font-size:.8rem;font-weight:600;color:#374151;margin:0 0 .5rem;">${x(label)}</p>
  <div style="display:flex;gap:.375rem;">
    ${['A','B','C','D','F'].map(g=>{
      const{bg,c}=gradeC(g);
      const sel=selected===g;
      return`<button onclick="selectGrade('${k}','${g}','${ctx}')" style="flex:1;padding:.5rem 0;font-size:.8rem;font-weight:700;border-radius:.5rem;cursor:pointer;transition:all .1s;border:${sel?`2px solid ${c}`:'2px solid #E5E7EB'};background:${sel?bg:'#fff'};color:${sel?c:'#6B7280'};">${g}</button>`;
    }).join('')}
  </div>
</div>`;
}

function selectGrade(k,g,ctx){
  if(!S.modal)return;
  // save text before re-render
  const ta=document.getElementById('modal-text');
  if(ta)S.modal.text=ta.value;
  S.modal.grades[k]=g;
  renderModal();
}

// ─── MODAL ENGINE ─────────────────────────────────────────────────────────────
function renderModal(){
  if(!S.modal){document.getElementById('modal-root').innerHTML='';return;}
  const inner=S.modal.type==='agency'?renderAgencyModal():renderSupervisorModal();
  document.getElementById('modal-root').innerHTML=`
  <div onclick="closeModal()" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:flex;align-items:flex-end;justify-content:center;padding:0 0 0 0;" id="modal-backdrop">
    <div class="modal-sheet" onclick="event.stopPropagation()" style="background:#fff;width:100%;max-width:480px;box-shadow:0 -4px 32px rgba(0,0,0,.15);overflow:hidden;max-height:92vh;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.5rem;border-bottom:1px solid #E5E7EB;flex-shrink:0;">
        <span style="font-size:.75rem;font-weight:600;color:#6B7280;">${S.modal.type==='agency'?'Rate Agency':'Rate Supervisor'}</span>
        <button onclick="closeModal()" style="border:none;background:none;cursor:pointer;color:#9CA3AF;padding:.25rem;">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div style="overflow-y:auto;flex:1;">${inner}</div>
    </div>
  </div>`;
}

function closeModal(){S.modal=null;document.getElementById('modal-root').innerHTML='';}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render(){
  S.tab='reviews';S.staffExpanded=false;
  const r=route();
  let html='';
  if(r.pg==='landing'){document.title='RateMyAgency';html=renderLanding();}
  else if(r.pg==='agency')html=renderAgency(r.slug);
  else if(r.pg==='supervisor')html=renderSupervisor(r.slug);
  else if(r.pg==='login')html=renderLogin();
  else if(r.pg==='signup')html=renderSignup();
  else{document.title='RateMyAgency';html=renderLanding();}
  document.getElementById('app').innerHTML=html;
  document.getElementById('modal-root').innerHTML='';
  renderDrawer();
}

window.addEventListener('hashchange',render);
window.addEventListener('load',render);
</script>
</body>
</html>
