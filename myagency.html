<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:#F5F5F7;color:#1C1C1E;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;border:none;background:none;font-family:inherit;-webkit-tap-highlight-color:transparent;}
input,textarea{font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px;}

/* ── Header ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;display:flex;align-items:center;padding:0 16px;background:rgba(250,250,252,0.88);backdrop-filter:saturate(200%) blur(20px);-webkit-backdrop-filter:saturate(200%) blur(20px);border-bottom:0.5px solid rgba(0,0,0,0.1);}
.hdr-l,.hdr-r{width:44px;display:flex;align-items:center;}
.hdr-r{justify-content:flex-end;}
.hdr-c{flex:1;display:flex;justify-content:center;}
.hdr-logo{font-size:16px;font-weight:700;color:#1B2E4B;letter-spacing:-0.4px;}
.hdr-ico{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#3C3C43;transition:background .15s;}
.hdr-ico:active{background:rgba(0,0,0,0.06);}
.hdr-auth{font-size:14px;font-weight:500;color:#1B2E4B;}

/* ── Page wrap ── */
.pw{padding-top:52px;}

/* ── Grade badges ── */
.gb{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;border-radius:7px;}
.gb-A{background:rgba(22,163,74,.09);color:#15803D;border:1px solid rgba(22,163,74,.18);}
.gb-B{background:rgba(101,163,13,.09);color:#4D7C0F;border:1px solid rgba(101,163,13,.18);}
.gb-C{background:rgba(202,138,4,.09);color:#92400E;border:1px solid rgba(202,138,4,.18);}
.gb-D{background:rgba(234,88,12,.09);color:#C2410C;border:1px solid rgba(234,88,12,.18);}
.gb-F{background:rgba(220,38,38,.09);color:#B91C1C;border:1px solid rgba(220,38,38,.18);}
.gb-sm{width:22px;height:22px;font-size:10.5px;border-radius:5px;}
.gb-md{width:30px;height:30px;font-size:13px;}
.gb-lg{width:40px;height:40px;font-size:18px;font-weight:800;border-radius:9px;}
.gb-xl{width:56px;height:56px;font-size:24px;font-weight:800;border-radius:12px;}

/* ── Cards ── */
.card{background:#fff;border-radius:16px;border:0.5px solid rgba(0,0,0,0.08);box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.card-p{padding:16px;}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;height:44px;padding:0 20px;border-radius:100px;font-size:14px;font-weight:600;white-space:nowrap;transition:opacity .15s;}
.btn:active{opacity:.75;}
.btn-navy{background:#1B2E4B;color:#fff;}
.btn-ghost{background:rgba(27,46,75,.07);color:#1B2E4B;}
.btn-outline{border:1.5px solid rgba(27,46,75,.3);color:#1B2E4B;}
.btn-sm{height:36px;padding:0 14px;font-size:13px;}

/* ── Tabs ── */
.tab-bar{display:flex;background:rgba(250,250,252,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:0.5px solid rgba(0,0,0,.09);position:sticky;top:52px;z-index:30;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;min-width:fit-content;padding:0 18px;height:46px;font-size:13.5px;font-weight:500;color:#8E8E93;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;}
.tab-btn.active{color:#1B2E4B;border-bottom-color:#1B2E4B;font-weight:600;}

/* ── Inputs ── */
.ios-input{width:100%;padding:11px 14px;font-size:15px;background:rgba(118,118,128,.12);border:none;border-radius:10px;outline:none;color:#1C1C1E;-webkit-appearance:none;}
.ios-input::placeholder{color:#8E8E93;}
.ios-input:focus{background:rgba(118,118,128,.18);}
.search-wrap{position:relative;}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:#8E8E93;}
.search-inp{width:100%;padding:11px 14px 11px 34px;font-size:15px;background:rgba(118,118,128,.12);border:none;border-radius:10px;outline:none;color:#1C1C1E;-webkit-appearance:none;}
.search-inp::placeholder{color:#8E8E93;}
.search-inp:focus{background:rgba(118,118,128,.18);}
.tf{width:100%;padding:12px 14px;font-size:15px;background:#fff;border:0.5px solid rgba(0,0,0,.15);border-radius:12px;outline:none;resize:none;color:#1C1C1E;line-height:1.5;}
.tf:focus{border-color:#1B2E4B;}

/* ── Chips ── */
.chip{display:inline-flex;align-items:center;padding:6px 13px;border-radius:100px;font-size:12.5px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s;border:1px solid rgba(0,0,0,.1);color:#3C3C43;background:#fff;}
.chip.active,.chip:active{background:#1B2E4B;border-color:#1B2E4B;color:#fff;}

/* ── Drawer ── */
.dr-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.dr-ov.open{opacity:1;pointer-events:auto;}
.dr{position:fixed;top:0;left:0;bottom:0;width:290px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,16px);}
.dr.open{transform:translateX(0);}

/* ── Modal ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;}
@media(min-width:600px){.mo{align-items:center;padding:24px;}}
.ms{background:#fff;width:100%;border-radius:22px 22px 0 0;max-height:92vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,8px);}
@media(min-width:600px){.ms{border-radius:22px;max-width:500px;margin:auto;}}

/* ── Misc ── */
.safe-b{padding-bottom:calc(32px + env(safe-area-inset-bottom,0px));}
.sep{height:0.5px;background:rgba(0,0,0,.07);}
.sl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#8E8E93;}
.gt{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;font-size:11px;font-weight:600;}
.gt-A{background:rgba(22,163,74,.09);color:#15803D;}
.gt-B{background:rgba(101,163,13,.09);color:#4D7C0F;}
.gt-C{background:rgba(202,138,4,.09);color:#92400E;}
.gt-D{background:rgba(234,88,12,.09);color:#C2410C;}
.gt-F{background:rgba(220,38,38,.09);color:#B91C1C;}
.rk{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;background:rgba(27,46,75,.07);color:#1B2E4B;}
</style>
</head>

// ── UTILS ─────────────────────────────────────────────────────────────────────
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ago(ds){const d=Math.floor((Date.now()-new Date(ds))/864e5);return d<1?'Today':d<7?d+'d ago':d<30?Math.floor(d/7)+'w ago':d<365?Math.floor(d/30)+'mo ago':Math.floor(d/365)+'y ago';}
function gb(g,sz='md'){if(!g)return'';return`<span class="gb gb-${g} gb-${sz}">${g}</span>`;}
function gradeC(g){return{A:{bg:'rgba(22,163,74,.09)',c:'#15803D'},B:{bg:'rgba(101,163,13,.09)',c:'#4D7C0F'},C:{bg:'rgba(202,138,4,.09)',c:'#92400E'},D:{bg:'rgba(234,88,12,.09)',c:'#C2410C'},F:{bg:'rgba(220,38,38,.09)',c:'#B91C1C'}}[g]||{bg:'rgba(0,0,0,.05)',c:'#6B7280'};}

const ACATS=[{k:'grade_communication',l:'Communication'},{k:'grade_fairness',l:'Fairness'},{k:'grade_accountability',l:'Accountability'},{k:'grade_backing_officers',l:'Backs Officers'},{k:'grade_morale',l:'Morale'},{k:'grade_promotion_fairness',l:'Promotions'},{k:'grade_work_life_balance',l:'Work / Life'},{k:'grade_toxic_leadership',l:'No Toxic Leadership'}];
const SCATS=[{k:'grade_communication',l:'Communication'},{k:'grade_fairness',l:'Fairness'},{k:'grade_accountability',l:'Accountability'},{k:'grade_professionalism',l:'Professionalism'},{k:'grade_retaliation',l:'No Retaliation'},{k:'grade_morale_impact',l:'Morale Impact'},{k:'grade_backing_officers',l:'Backs Officers'},{k:'grade_promotion_fairness',l:'Promotions'},{k:'grade_assignment_fairness',l:'Assignments'}];

function avgGrade(reviews,cats){
  if(!reviews||!reviews.length)return{};
  const t={},c={},m={A:4,B:3,C:2,D:1,F:0};
  for(const r of reviews)for(const{k}of cats)if(r[k]){t[k]=(t[k]||0)+m[r[k]];c[k]=(c[k]||0)+1;}
  const o={};
  for(const{k}of cats)if(c[k]){const a=t[k]/c[k];o[k]=a>=3.5?'A':a>=2.5?'B':a>=1.5?'C':a>=0.5?'D':'F';}
  return o;
}

const QA_SORTS=[
  {id:'recent',label:'Recent'},{id:'replies',label:'Most Replied'},
  {id:'hiring',label:'Hiring'},{id:'specialty',label:'Specialty Units'},
  {id:'patrol',label:'Patrol Schedule'},{id:'culture',label:'Culture'},
  {id:'equipment',label:'Equipment'},{id:'promotions',label:'Promotions'},
];

function qaTab(slug,agencyId){
  let questions=[...(QUESTIONS_DATA[slug]||[]),...(S.localQ[slug]||[])];
  const sort=S.qaSort||'recent';
  if(sort==='replies')questions=[...questions].sort((a,b)=>((b.replies||[]).length+(S.localReply[b.id]||[]).length)-((a.replies||[]).length+(S.localReply[a.id]||[]).length));
  else if(['hiring','specialty','patrol','culture','equipment','promotions'].includes(sort))questions=questions.filter(q=>(q.tags||[]).includes(sort));

  return`<div>
  ${S.user?`<div class="card card-p" style="margin-bottom:16px;">
    <textarea class="tf" id="qa-inp" rows="3" placeholder="Ask anonymously about this agency — culture, schedules, hiring, equipment…" style="margin-bottom:10px;"></textarea>
    <button class="btn btn-navy btn-sm" onclick="submitQ('${x(slug)}',${agencyId})">Post Question</button>
  </div>`:`<div class="card card-p" style="margin-bottom:16px;text-align:center;">
    <p style="font-size:14px;color:#6B7280;margin-bottom:10px;">Join anonymously to ask and answer questions.</p>
    <div style="display:flex;justify-content:center;gap:8px;"><a href="#/login" class="btn btn-navy btn-sm">Log in</a><a href="#/signup" class="btn btn-ghost btn-sm">Sign up</a></div>
  </div>`}
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:16px;padding-bottom:4px;display:flex;gap:8px;">
    ${QA_SORTS.map(s=>`<button class="chip${sort===s.id?' active':''}" onclick="setQaSort('${s.id}','${x(slug)}')" style="flex-shrink:0;">${s.label}</button>`).join('')}
  </div>
  ${questions.length===0
    ?`<div style="text-align:center;padding:48px 0;"><p style="font-size:15px;color:#8E8E93;">No questions yet${sort!=='recent'?' in this category':''}.</p></div>`
    :`<div style="display:flex;flex-direction:column;gap:10px;">${questions.map(q=>qCard(q,slug)).join('')}</div>`
  }
</div>`;}

function qCard(q,slug){
  const replies=[...(q.replies||[]),...(S.localReply[q.id]||[])];
  const shown=S.expReplies[q.id];
  return`<div class="card card-p">
  <p style="font-size:14.5px;font-weight:500;color:#1C1C1E;line-height:1.5;margin-bottom:6px;">${x(q.body)}</p>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:${(replies.length>0||S.user)?'12px':'0'};">
    <span style="font-size:12px;color:#8E8E93;">${ago(q.created_at)}</span>
    ${(q.tags||[]).map(t=>`<span style="font-size:11px;font-weight:500;background:rgba(27,46,75,.07);color:#1B2E4B;padding:2px 7px;border-radius:100px;">${t}</span>`).join('')}
  </div>
  ${replies.length>0?`<button onclick="toggleR(${q.id},'${x(slug)}')" style="font-size:13px;font-weight:600;color:#1B2E4B;margin-bottom:10px;">${shown?'Hide':'View'} ${replies.length} repl${replies.length!==1?'ies':'y'}</button>
  ${shown?`<div style="border-left:2px solid rgba(27,46,75,.12);padding-left:14px;margin-bottom:12px;display:flex;flex-direction:column;gap:10px;">${replies.map(r=>`<div><p style="font-size:13.5px;color:#374151;line-height:1.5;">${x(r.body)}</p><p style="font-size:11.5px;color:#8E8E93;margin-top:4px;">${ago(r.created_at)}</p></div>`).join('')}</div>`:''}`:''}
  ${S.user?`<div style="display:flex;gap:8px;align-items:center;">
    <input id="ri-${q.id}" class="ios-input" style="flex:1;" placeholder="Reply anonymously…" onkeydown="if(event.key==='Enter')submitReply(${q.id},'${x(slug)}')">
    <button class="btn btn-ghost btn-sm" onclick="submitReply(${q.id},'${x(slug)}')">Reply</button>
  </div>`:''}
</div>`;}

function setQaSort(sort,slug){S.qaSort=sort;document.getElementById('app').innerHTML=renderAgency(slug);}
function toggleR(qid,slug){S.expReplies[qid]=!S.expReplies[qid];document.getElementById('app').innerHTML=renderAgency(slug);}
function toggleStaff(slug){S.staffExp=!S.staffExp;document.getElementById('app').innerHTML=renderAgency(slug);}
function swTab(tab,slug){S.tab=tab;S.staffExp=false;document.getElementById('app').innerHTML=renderAgency(slug);window.scrollTo(0,0);}

function submitQ(slug,agencyId){
  const el=document.getElementById('qa-inp');if(!el||!el.value.trim())return;
  const q={id:Date.now(),created_at:new Date().toISOString(),body:el.value.trim(),tags:[],replies:[]};
  if(!S.localQ[slug])S.localQ[slug]=[];S.localQ[slug].unshift(q);
  document.getElementById('app').innerHTML=renderAgency(slug);
}
function submitReply(qid,slug){
  const el=document.getElementById('ri-'+qid);if(!el||!el.value.trim())return;
  const r={id:Date.now(),created_at:new Date().toISOString(),body:el.value.trim()};
  if(!S.localReply[qid])S.localReply[qid]=[];S.localReply[qid].push(r);
  S.expReplies[qid]=true;
  document.getElementById('app').innerHTML=renderAgency(slug);
}

function doSignup(e){e.preventDefault();const u=document.getElementById('su').value.trim(),p=document.getElementById('sp').value,err=document.getElementById('suerr');if(!u||u.length<3){err.textContent='Username must be at least 3 characters.';err.style.display='block';return;}if(!/^[a-zA-Z0-9_]+$/.test(u)){err.textContent='Username may only contain letters, numbers, and underscores.';err.style.display='block';return;}if(!p||p.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}setUser({username:u,id:'u'+Date.now()});go('/');}

function agModal(){
  const m=S.modal;
  if(m.step===0)return`<div style="padding:24px;">

      <div style="height:3px;background:#F5F5F7;border-radius:2px;overflow:hidden;margin-bottom:16px;"><div style="height:100%;background:#1B2E4B;width:${pct}%;transition:width .2s;border-radius:2px;"></div></div>
      <p style="font-size:11px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">${filled} of ${SCATS.length} rated</p>
      <h2 style="font-size:17px;font-weight:700;color:#1B2E4B;margin-bottom:2px;">${sup?x(sup.display_name):'Supervisor'}</h2>
      <p style="font-size:13px;color:#8E8E93;margin-bottom:0;">A = Excellent · F = Failing</p>
    </div>
    <div style="overflow-y:auto;flex:1;padding:16px 20px;display:flex;flex-direction:column;gap:18px;">
      ${SCATS.map(({k,l})=>gradeRow(k,l,m.grades[k],'sup')).join('')}
      <div><label style="display:block;font-size:13px;font-weight:500;color:#6B7280;margin-bottom:8px;">Written review <span style="font-weight:400;">(optional)</span></label><textarea id="mt" class="tf" rows="3" placeholder="Specific examples, patterns, what others should know…">${x(m.text||'')}</textarea></div>
    </div>
    <div style="padding:16px 20px;border-top:0.5px solid rgba(0,0,0,.07);">
      <button class="btn btn-navy" style="width:100%;${filled===0?'opacity:.4;pointer-events:none':''}" onclick="submitSupRev()">Submit Review</button>
    </div>`;}
  return successSlide();
}

function submitSupRev(){const ta=document.getElementById('mt');if(ta)S.modal.text=ta.value;const m=S.modal,r={id:Date.now(),created_at:new Date().toISOString(),...m.grades,body:m.text||null};const sl=m.supervisorSlug;if(sl){if(!S.localSupRev[sl])S.localSupRev[sl]=[];S.localSupRev[sl].unshift(r);}m.step=2;mRender();}

function gradeRow(k,label,selected,ctx){
  return`<div><p style="font-size:13.5px;font-weight:600;color:#374151;margin-bottom:8px;">${x(label)}</p>
  <div style="display:flex;gap:6px;">
    ${['A','B','C','D','F'].map(g=>{const{bg,c}=gradeC(g);const sel=selected===g;return`<button onclick="selGrade('${k}','${g}','${ctx}')" style="flex:1;height:40px;font-size:13px;font-weight:700;border-radius:8px;border:${sel?`1.5px solid ${c}`:'1px solid rgba(0,0,0,.1)'};background:${sel?bg:'#fff'};color:${sel?c:'#6B7280'};transition:all .1s;">${g}</button>`;}).join('')}
  </div></div>`;}

function selGrade(k,g,ctx){if(!S.modal)return;const ta=document.getElementById('mt');if(ta)S.modal.text=ta.value;S.modal.grades[k]=g;mRender();}

function successSlide(){return`<div style="padding:40px 24px;text-align:center;">
  <div style="width:52px;height:52px;background:rgba(22,163,74,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
    <svg width="22" height="22" fill="none" stroke="#16A34A" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h2 style="font-size:18px;font-weight:700;color:#1B2E4B;margin-bottom:8px;">Review submitted</h2>
  <p style="font-size:14px;color:#6B7280;margin-bottom:24px;">Thank you for keeping law enforcement accountable.</p>
  <button class="btn btn-navy" onclick="closeModal()">Done</button>
</div>`;}

// ── MODAL ENGINE ──────────────────────────────────────────────────────────────
function mRender(){
  if(!S.modal){document.getElementById('modal-root').innerHTML='';return;}
  const inner=S.modal.type==='ag'?agModal():supModal();
  document.getElementById('modal-root').innerHTML=`<div class="mo" onclick="closeModal()">
  <div class="ms" onclick="event.stopPropagation()">
    <div style="padding:12px 20px;border-bottom:0.5px solid rgba(0,0,0,.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <span style="font-size:13px;font-weight:600;color:#8E8E93;">${S.modal.type==='ag'?'Rate Agency':'Rate Supervisor'}</span>
      <button onclick="closeModal()" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(0,0,0,.06);color:#6B7280;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div style="overflow-y:auto;flex:1;display:flex;flex-direction:column;">${inner}</div>
  </div>
</div>`;}

function closeModal(){S.modal=null;document.getElementById('modal-root').innerHTML='';}

// ── NOT FOUND ─────────────────────────────────────────────────────────────────
function notFound(){return`${hdr()}<div class="pw" style="display:flex;align-items:center;justify-content:center;min-height:calc(100svh - 52px);padding:40px 24px;text-align:center;"><div><p style="font-size:15px;color:#8E8E93;margin-bottom:16px;">Page not found.</p><a href="#/" class="btn btn-ghost">Back to search</a></div></div>`;}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  S.tab='reviews';S.staffExp=false;S.qaSort='recent';
  const r=rt();
  let html='';
  if(r.pg==='landing')html=renderLanding();
  else if(r.pg==='agency')html=renderAgency(r.slug);
  else if(r.pg==='supervisor')html=renderSupervisor(r.slug);
  else if(r.pg==='login')html=renderLogin();
  else if(r.pg==='signup')html=renderSignup();
  else html=renderLanding();
  document.getElementById('app').innerHTML=html;
  document.getElementById('modal-root').innerHTML='';
  drRender();
  window.scrollTo(0,0);
}

window.addEventListener('hashchange',render);
window.addEventListener('load',render);
</script>
</body>
</html>
