<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — MicroPatches</title>
  <meta name="description" content="Browse all MicroPatches UV-printed 3D patch keychains for law enforcement, military, fire, EMS, and more. No minimum orders.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://officialmicropatches.com/shop.html">
  <meta property="og:title" content="Shop — MicroPatches Patch Keychains">
  <meta property="og:description" content="Browse 70+ UV-printed 3D patch keychains for law enforcement, military, fire, EMS. No minimum orders. $13.99 each.">
  <meta property="og:image" content="https://officialmicropatches.com/assets/img/og-cover.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://officialmicropatches.com/shop.html">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=20260704">
  <link rel="stylesheet" href="assets/css/audit-fixes.css?v=20260704">
  <script src="assets/js/audit-fixes.js?v=20260520" defer></script>
</head>
<body data-page="shop">

<div data-site-header></div>

  <!-- ===== PAGE HERO ===== -->
  <section class="page-hero">
    <div class="container">
      <p class="eyebrow">All Products</p>
      <h1>THE SHOP</h1>
      <div class="shop-search-wrap">
        <svg class="shop-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="shop-search" class="shop-search-input" placeholder="Search by agency or unit name…" aria-label="Search patches by name">
      </div>
    </div>
  </section>

  <!-- ===== SHOP TABS (filter buttons — not ARIA tabs; no tabpanel exists) ===== -->
  <div class="shop-tabs-wrap">
    <div class="shop-tabs" aria-label="Product categories">
      <button class="shop-tab active" data-tab="all" aria-pressed="true">All</button>
      <button class="shop-tab" data-tab="law-enforcement" aria-pressed="false" id="law-enforcement">Law Enforcement</button>
      <button class="shop-tab" data-tab="corrections" aria-pressed="false" id="corrections">Corrections</button>
      <button class="shop-tab" data-tab="military" aria-pressed="false" id="military">Military</button>
      <button class="shop-tab" data-tab="fire" aria-pressed="false" id="fire">Fire Departments</button>
      <button class="shop-tab" data-tab="ems" aria-pressed="false" id="ems">EMS</button>
      <button class="shop-tab" data-tab="pink-patch" aria-pressed="false" id="pink-patch">Pink Patch</button>
    </div>
  </div>

  <div class="shop-filter-panel" aria-label="Shop subfilters">
    <div class="shop-filter-group" data-filter-for="law-enforcement">
      <!-- State filter hidden until every Shopify product carries a
           "state: XX" tag — title-based inference silently hides valid
           products (e.g. "Goodyear Police Department" has no state in
           its title, so it vanished under any state selection). -->
      <label class="shop-filter-select" hidden>
        <span>State</span>
        <select data-shop-filter="state">
          <option value="all">All States</option>
          <option value="AL">Alabama</option>
          <option value="AZ">Arizona</option>
          <option value="CA">California</option>
          <option value="DC">District of Columbia</option>
          <option value="FL">Florida</option>
          <option value="HI">Hawaii</option>
          <option value="IL">Illinois</option>
          <option value="MD">Maryland</option>
          <option value="MA">Massachusetts</option>
          <option value="MI">Michigan</option>
          <option value="NV">Nevada</option>
          <option value="NM">New Mexico</option>
          <option value="NY">New York</option>
          <option value="NC">North Carolina</option>
          <option value="OH">Ohio</option>
          <option value="OR">Oregon</option>
          <option value="PA">Pennsylvania</option>
          <option value="TN">Tennessee</option>
          <option value="TX">Texas</option>
          <option value="WA">Washington</option>
          <option value="WI">Wisconsin</option>
        </select>
      </label>
      <div class="shop-filter-pills" aria-label="Law enforcement agency type">
        <button class="shop-subfilter active" aria-pressed="true" data-shop-filter="type" data-filter-value="all">All Law</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="type" data-filter-value="police">Police Dept.</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="type" data-filter-value="sheriff">Sheriff's Office</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="type" data-filter-value="state">State Troopers / DPS</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="type" data-filter-value="tribal">Tribal Agencies</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="type" data-filter-value="university">University PD</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="type" data-filter-value="federal">Federal Agencies</button>
      </div>
    </div>

    <div class="shop-filter-group" data-filter-for="corrections">
      <label class="shop-filter-select" hidden>
        <span>State</span>
        <select data-shop-filter="state">
          <option value="all">All States</option>
          <option value="AZ">Arizona</option>
          <option value="WA">Washington</option>
        </select>
      </label>
    </div>

    <div class="shop-filter-group" data-filter-for="fire">
      <label class="shop-filter-select" hidden>
        <span>State</span>
        <select data-shop-filter="state">
          <option value="all">All States</option>
          <option value="AZ">Arizona</option>
        </select>
      </label>
    </div>

    <div class="shop-filter-group" data-filter-for="military">
      <div class="shop-filter-pills" aria-label="Military branch">
        <button class="shop-subfilter active" aria-pressed="true" data-shop-filter="branch" data-filter-value="all">All Military</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="branch" data-filter-value="army">Army</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="branch" data-filter-value="marines">Marine Corps</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="branch" data-filter-value="navy">Navy</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="branch" data-filter-value="air-force">Air Force</button>
      </div>
    </div>

    <div class="shop-filter-group" data-filter-for="ems">
      <div class="shop-filter-pills" aria-label="EMS role">
        <button class="shop-subfilter active" aria-pressed="true" data-shop-filter="type" data-filter-value="all">All EMS</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="type" data-filter-value="emt">EMT</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="type" data-filter-value="paramedic">Paramedic</button>
        <button class="shop-subfilter" aria-pressed="false" data-shop-filter="type" data-filter-value="cct-rn">CCT-RN</button>
      </div>
    </div>
  </div>

  <!-- ===== PRODUCT GRID ===== -->
  <section class="section">
    <div class="container">
      <p class="product-count" id="product-count" aria-live="polite"></p>
      <div class="product-grid">
        <p class="shop-loading" id="shop-loading">Loading the latest catalog…</p>
      </div>
      <p class="shop-empty-state" id="shop-empty" hidden>No keychains match these filters. Try another category — or <a href="custom.html">request a custom build</a>.</p>
      <div class="shop-more-wrap" id="shop-more-wrap" hidden>
        <button type="button" class="btn btn--ghost btn--lg" id="shop-more"><span class="label">Show more</span></button>
      </div>
    </div>
  </section>

  <script src="assets/js/shopify-config.js?v=20260520"></script>
  <script src="assets/js/shopify-loader.js?v=20260704"></script>
  <script src="assets/js/site.js?v=20260704"></script>
<div data-site-footer></div>
<div data-cart-drawer-mount></div>
</body>
</html>
