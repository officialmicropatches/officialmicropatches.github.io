<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Custom Orders — Internal</title>
<style>
  :root { --bg:#0e0c0a; --bg2:#171311; --line:#2a2521; --ink:#f3ede4; --dim:#9a8f80; --gold:#d8a23a; --ok:#6ad29a; --bad:#f08a8a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  header { padding:18px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px; position:sticky; top:0; background:var(--bg); z-index:5; }
  header h1 { font-size:16px; margin:0; letter-spacing:.06em; text-transform:uppercase; }
  header .meta { font-size:12px; color:var(--dim); }
  .wrap { max-width:920px; margin:0 auto; padding:16px; }
  .gate { max-width:380px; margin:14vh auto; padding:0 16px; text-align:center; }
  .gate h2 { font-size:15px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
  input[type=password], input[type=search] { width:100%; padding:13px 14px; background:var(--bg2); border:1px solid var(--line); border-radius:10px; color:var(--ink); font-size:15px; }
  button { font:inherit; cursor:pointer; border-radius:10px; border:1px solid var(--line); background:var(--gold); color:#1a1407; font-weight:700; padding:12px 18px; letter-spacing:.04em; }
  button.ghost { background:transparent; color:var(--ink); }
  .toolbar { display:flex; gap:10px; margin-bottom:14px; }
  .toolbar input { flex:1; }
  .count { font-size:12px; color:var(--dim); margin:0 0 12px; letter-spacing:.06em; text-transform:uppercase; }
  .card { background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:12px; display:grid; grid-template-columns:96px 1fr; gap:14px; }
  .card img { width:96px; height:96px; object-fit:cover; border-radius:8px; background:#000; border:1px solid var(--line); }
  .card .noimg { width:96px; height:96px; border-radius:8px; border:1px dashed var(--line); display:flex; align-items:center; justify-content:center; color:var(--dim); font-size:10px; text-align:center; }
  .card h3 { margin:0 0 4px; font-size:16px; }
  .card .sub { color:var(--dim); font-size:12px; margin:0 0 8px; }
  .row { font-size:14px; margin:3px 0; word-break:break-word; }
  .row b { color:var(--dim); font-weight:600; }
  .row a { color:var(--gold); }
  .badge { display:inline-block; font-size:10px; letter-spacing:.08em; text-transform:uppercase; background:rgba(216,162,58,.16); color:var(--gold); border:1px solid rgba(216,162,58,.4); padding:2px 8px; border-radius:999px; margin-left:8px; }
  .msg { padding:24px 0; text-align:center; color:var(--dim); }
  .msg.bad { color:var(--bad); }
  @media (max-width:560px){ .card{ grid-template-columns:64px 1fr; } .card img,.card .noimg{ width:64px;height:64px; } }
</style>
</head>
<body>

<div id="gate" class="gate">
  <h2>Internal — Custom Orders</h2>
  <p style="color:var(--dim);font-size:13px">Enter the access code.</p>
  <form id="gate-form">
    <input type="password" id="gate-pw" autocomplete="off" autofocus placeholder="Access code">
    <p id="gate-err" class="msg bad" style="display:none">Incorrect code.</p>
    <button type="submit" style="width:100%;margin-top:12px">View Orders</button>
  </form>
</div>

<div id="app" style="display:none">
  <header>
    <h1>Custom Orders</h1>
    <span class="meta" id="hdr-meta">—</span>
  </header>
  <div class="wrap">
    <div class="toolbar">
      <input type="search" id="q" placeholder="Filter by name, agency, email…">
      <button class="ghost" id="refresh">Refresh</button>
    </div>
    <p class="count" id="count"></p>
    <div id="list"><p class="msg">Loading…</p></div>
  </div>
</div>

<script type="module">
import { initializeApp, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* Change this to rotate the access code. NOTE: this is a convenience gate
   only — anyone who views source can read it. The real protection on the
   data is the Firestore security rules. */
const ACCESS_CODE = "micropatches";

const FB_CONFIG = {
  apiKey: "AIzaSyBJD5r0KmlqygWAa0rT17dWplXQQ96IeW4",
  authDomain: "patch-559c8.firebaseapp.com",
  projectId: "patch-559c8",
  storageBucket: "patch-559c8.firebasestorage.app",
  messagingSenderId: "584233188985",
  appId: "1:584233188985:web:7be3979a2ad505bc711ea8"
};
let app; try { app = getApp(); } catch (_e) { app = initializeApp(FB_CONFIG); }
const db = getFirestore(app);
const auth = getAuth(app);

const gate = document.getElementById("gate");
const gateForm = document.getElementById("gate-form");
const gateErr = document.getElementById("gate-err");
const appEl = document.getElementById("app");
const listEl = document.getElementById("list");
const countEl = document.getElementById("count");
const qEl = document.getElementById("q");
const hdrMeta = document.getElementById("hdr-meta");

let all = [];

function esc(s){ return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function fmtDate(iso){
  if (!iso) return "—";
  const d = new Date(iso);
  return isNaN(d) ? esc(iso) : d.toLocaleString("en-US", { dateStyle:"medium", timeStyle:"short" });
}

function row(label, val, isLink){
  if (!val) return "";
  const v = isLink
    ? '<a href="' + esc(val) + '" target="_blank" rel="noopener">Open photo ↗</a>'
    : esc(val);
  return '<div class="row"><b>' + label + ':</b> ' + v + '</div>';
}

function render(items){
  if (!items.length){ listEl.innerHTML = '<p class="msg">No orders match.</p>'; countEl.textContent = "0 orders"; return; }
  countEl.textContent = items.length + " order" + (items.length === 1 ? "" : "s");
  listEl.innerHTML = items.map(function(s){
    const photo = s.patchPhotoURL
      ? '<a href="' + esc(s.patchPhotoURL) + '" target="_blank" rel="noopener"><img src="' + esc(s.patchPhotoURL) + '" alt=""></a>'
      : '<div class="noimg">No photo</div>';
    const isCustom = (s.type === "custom-order");
    return '<div class="card">' + photo +
      '<div>' +
        '<h3>' + esc(s.name || "(no name)") +
          (isCustom ? '<span class="badge">custom order</span>' : '') + '</h3>' +
        '<p class="sub">' + fmtDate(s.submittedAt) + (s.source ? " · " + esc(s.source) : "") + '</p>' +
        row("Agency / unit", s.agency) +
        row("Email", s.email) +
        row("Phone", s.phone) +
        row("Product", s.productType) +
        row("Qty / notes", s.description || s.quantity) +
        row("Referral", s.referral) +
        row("Photo", s.patchPhotoURL, true) +
      '</div>' +
    '</div>';
  }).join("");
}

function applyFilter(){
  const q = (qEl.value || "").trim().toLowerCase();
  if (!q){ render(all); return; }
  render(all.filter(function(s){
    return [s.name, s.agency, s.email, s.phone, s.description, s.productType]
      .filter(Boolean).join(" ").toLowerCase().indexOf(q) !== -1;
  }));
}

async function load(){
  listEl.innerHTML = '<p class="msg">Loading…</p>';
  try {
    if (!auth.currentUser) await signInAnonymously(auth);
    const snap = await getDocs(collection(db, "submissions"));
    all = snap.docs.map(d => d.data());
    all.sort((a,b) => String(b.submittedAt || "").localeCompare(String(a.submittedAt || "")));
    hdrMeta.textContent = all.length + " total";
    applyFilter();
  } catch (err) {
    listEl.innerHTML = '<p class="msg bad">Failed to load: ' + esc(err && err.message || err) + '</p>';
  }
}

gateForm.addEventListener("submit", function(e){
  e.preventDefault();
  if (document.getElementById("gate-pw").value === ACCESS_CODE){
    try { sessionStorage.setItem("mp_orders_ok", "1"); } catch (_e) {}
    gate.style.display = "none";
    appEl.style.display = "block";
    load();
  } else {
    gateErr.style.display = "block";
  }
});

qEl.addEventListener("input", applyFilter);
document.getElementById("refresh").addEventListener("click", load);

try {
  if (sessionStorage.getItem("mp_orders_ok") === "1"){
    gate.style.display = "none";
    appEl.style.display = "block";
    load();
  }
} catch (_e) {}
</script>
</body>
</html>
